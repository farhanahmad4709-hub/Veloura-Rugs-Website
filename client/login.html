<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Veloura Rugs</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<!-- BACKGROUND -->
<div class="auth-bg"></div>

<!-- PAGE -->
<div class="auth-page">

  <!-- ORNAMENT -->
  <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>

  <!-- LOGO -->
  <div class="auth-logo">
    <a href="../index.html" class="logo">
      <img src="../image/logo.png" alt="Veloura Rugs" style="height:56px;width:auto;object-fit:contain;display:block;margin:auto;" />
      <span style="font-size:0.95rem;color:var(--ink);font-weight:700;margin-top:0.55rem;display:block;text-align:center;">Veloura Rugs</span>
    </a>
    <p>Artistry &amp; History in Every Knot</p>
  </div>

  <!-- CARD -->
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="gold-line"></div>
      <h1>Welcome Back</h1>
      <p>Sign in to your Veloura account</p>
    </div>

    <form id="loginForm" novalidate autocomplete="off">

      <!-- EMAIL -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <div class="field-msg hint" id="emailMsg"></div>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pw" aria-label="Toggle password visibility">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="field-msg hint" id="pwMsg"></div>
      </div>

      <!-- REMEMBER ME + FORGOT -->
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe" />
          Remember me
        </label>
        <a href="#" class="form-link" onclick="showToast('Password reset coming soon.','info');return false;">
          Forgot password?
        </a>
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="btn-auth">Sign In</button>

    </form>

    <!-- DIVIDER -->
    <div class="auth-divider"><span>New to Veloura?</span></div>

    <!-- FOOTER LINK -->
    <div class="auth-footer-text">
      Don't have an account?
      <a href="signup.html">Create one — it's free</a>
    </div>
  </div>

  <!-- TRUST BADGES -->
  <div class="auth-trust">
    <span class="trust-badge">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Secure Login
    </span>
    <span class="trust-badge">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      256-bit Encrypted
    </span>
    <span class="trust-badge">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Private & Safe
    </span>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
